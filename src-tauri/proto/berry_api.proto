message FindRefsRequest {
  string session_id = 1;
  string file_uri = 2;
  Position position = 3;
  bool include_declaration = 4;
}

message FindRefsResponse {
  repeated Location locations = 1;
}

message DiagnosticsReq {
  string session_id = 1;
  string file_uri = 2;
}

message DiagnosticsResp {
  repeated Diagnostic diagnostics = 1;
}

message ShutdownLSPRequest {
  string session_id = 1;
  string language = 2;
}

message ShutdownLSPResponse {
  bool success = 1;
}

// === Git Operations ===
message GitStatusRequest {
  string session_id = 1;
}

message GitStatusResponse {
  string branch = 1;
  repeated GitFileStatus files = 2;
  uint32 ahead = 3;
  uint32 behind = 4;
}

message GitFileStatus {
  string path = 1;
  string status = 2; // "modified", "added", "deleted", "untracked"
}

message GitCommitRequest {
  string session_id = 1;
  string message = 2;
  repeated string files = 3;
}

message GitCommitResponse {
  bool success = 1;
  string commit_hash = 2;
  optional string error = 3;
}

message GitDiffRequest {
  string session_id = 1;
  optional string file_path = 2;
  optional bool staged = 3;
}

message GitDiffResponse {
  string diff = 1;
}

message GitUndoRequest {
  string session_id = 1;
  optional string file_path = 2;
}

message GitUndoResponse {
  bool success = 1;
  repeated string reverted_files = 2;
}

message GitLogRequest {
  string session_id = 1;
  optional uint32 limit = 2;
  optional string file_path = 3;
}

message GitLogResponse {
  repeated GitCommitEntry entries = 1;
}

message GitCommitEntry {
  string hash = 1;
  string author = 2;
  string message = 3;
  string timestamp = 4;
}

// === File System Operations ===
message ReadFileRequest {
  string session_id = 1;
  string file_path = 2;
}

message ReadFileResponse {
  string content = 1;
  optional string encoding = 2;
  optional uint64 modified_time = 3;  // Unix timestamp
}

message WriteFileRequest {
  string session_id = 1;
  string file_path = 2;
  string content = 3;
  optional bool create_dirs = 4;
  // AI metadata for tracking changes
  optional string ai_reasoning_id = 5;  // AI推論セッションID
  optional string change_reason = 6;     // なぜこの変更を行ったか
  optional string ai_context = 7;        // AIが使用したコンテキスト情報
}

message WriteFileResponse {
  bool success = 1;
  optional string error = 2;
}

message CreateFileRequest {
  string session_id = 1;
  string file_path = 2;
  optional string initial_content = 3;
}

message CreateFileResponse {
  bool success = 1;
  string file_path = 2;
  optional string error = 3;
}

message DeleteFileRequest {
  string session_id = 1;
  string file_path = 2;
}

message DeleteFileResponse {
  bool success = 1;
  optional string error = 2;
}

message ListDirRequest {
  string session_id = 1;
  string directory_path = 2;
  optional bool recursive = 3;
}

message ListDirResponse {
  repeated FileEntry entries = 1;
}

message FileEntry {
  string name = 1;
  string path = 2;
  bool is_directory = 3;
  optional uint64 size = 4;
  optional string modified_time = 5;
  optional string language = 6;  // Detected programming language
}

message RenameFileRequest {
  string session_id = 1;
  string old_path = 2;
  string new_path = 3;
}

message RenameFileResponse {
  bool success = 1;
  optional string error = 2;
}

// === Cargo/Build Operations ===
message CargoCheckRequest {
  string session_id = 1;
  optional string manifest_path = 2;
}

message CargoCheckOutput {
  string output = 1;
  bool is_error = 2;
  bool is_final = 3;
  repeated CargoDiagnostic diagnostics = 4;
}

message CargoDiagnostic {
  string message = 1;
  string level = 2; // "error", "warning", "note"
  optional string file_path = 3;
  optional uint32 line = 4;
  optional uint32 column = 5;
}

message CargoTestRequest {
  string session_id = 1;
  optional string test_name = 2;
  optional string manifest_path = 3;
}

message CargoTestOutput {
  string output = 1;
  bool is_error = 2;
  bool is_final = 3;
  optional CargoTestSummary summary = 4;
}

message CargoTestSummary {
  uint32 total = 1;
  uint32 passed = 2;
  uint32 failed = 3;
  uint32 ignored = 4;
}

message CargoBuildRequest {
  string session_id = 1;
  optional string manifest_path = 2;
  optional bool release = 3;
}

message CargoBuildOutput {
  string output = 1;
  bool is_error = 2;
  bool is_final = 3;
  optional string artifact_path = 4;
}

// === Model Management ===
message SetModelRequest {
  string session_id = 1;
  string model = 2;
}

message SetModelResponse {
  bool success = 1;
  string model = 2;
}

message ListModelsReq {
  string session_id = 1;
}

message ListModelsResp {
  repeated CLIModelInfo models = 1;
}

message CLIModelInfo {
  string name = 1;
  string provider = 2;
  optional string description = 3;
  bool available = 4;
}

// === Project Context ===
message ProjectContextRequest {
  string session_id = 1;
  optional bool include_git = 2;
  optional bool include_diagnostics = 3;
  optional bool include_symbols = 4;
}

message ProjectContextResponse {
  string project_root = 1;
  repeated string files = 2;
  optional CLIGitStatus git_status = 3;
  repeated CLIDiagnostic diagnostics = 4;
  repeated CLISymbol symbols = 5;
  optional FileStatistics file_stats = 6;
}

message CLIGitStatus {
  string branch = 1;
  uint32 uncommitted_changes = 2;
  uint32 untracked_files = 3;
  uint32 ahead = 4;
  uint32 behind = 5;
}

message CLIDiagnostic {
  string file_path = 1;
  uint32 line = 2;
  uint32 column = 3;
  string severity = 4;
  string message = 5;
  string source = 6;
}

message CLISymbol {
  string name = 1;
  string kind = 2;
  string file_path = 3;
  uint32 line = 4;
  uint32 column = 5;
}

message FileStatistics {
  uint64 total_files = 1;
  uint64 total_lines = 2;
  map<string, uint64> files_by_language = 3;
}
