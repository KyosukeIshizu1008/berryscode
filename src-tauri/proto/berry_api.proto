  string file_path = 2;
}

message DropFileResponse {
  bool success = 1;
  string file_path = 2;
}

message ListFilesRequest {
  string session_id = 1;
}

message ListFilesResponse {
  repeated string files = 1;
}

message GetFileRequest {
  string session_id = 1;
  string file_path = 2;
}

message GetFileResponse {
  string file_path = 1;
  string content = 2;
  optional string language = 3;
}

// === LSP Integration ===
