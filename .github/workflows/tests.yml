name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─── Build & Test (Linux) ────────────────────────────────────
  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libx11-dev libxi-dev libxcursor-dev libxrandr-dev libxinerama-dev \
            libxkbcommon-dev \
            libasound2-dev \
            libudev-dev \
            libssl-dev \
            libwayland-dev \
            libgtk-3-dev \
            libatk1.0-dev \
            libglib2.0-dev \
            libpipewire-0.3-dev \
            libgbm-dev \
            libxcb1-dev \
            libegl-dev \
            protobuf-compiler

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-test-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Build
        run: cargo build --release --bin berrycode

      - name: Run unit tests
        run: cargo test -p berry-editor --lib --verbose

      - name: Clippy
        run: cargo clippy -p berry-editor -- -W warnings
        continue-on-error: true

  # ─── Build check (macOS) ─────────────────────────────────────
  check-macos:
    name: Check (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-check-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --bin berrycode

      - name: Run unit tests
        run: cargo test -p berry-editor --lib

  # ─── Build check (Windows) ───────────────────────────────────
  check-windows:
    name: Check (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-check-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --bin berrycode

      - name: Run unit tests
        run: cargo test -p berry-editor --lib

  # ─── Gate ────────────────────────────────────────────────────
  ci-passed:
    name: CI Passed
    needs: [test-linux, check-macos, check-windows]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All CI checks passed"
