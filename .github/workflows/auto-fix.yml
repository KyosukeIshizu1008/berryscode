name: Auto Fix Issues

on:
  schedule:
    - cron: '0 1 * * *'  # 毎日 1:00 UTC
  workflow_dispatch:  # 手動実行

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      - name: Pull Model
        run: |
          ollama pull qwen2.5-coder:32b-instruct-q8_0

      - name: Get Open Issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 get-issues.py

      - name: Fix Issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x .github/workflows/fix-issues.sh
          .github/workflows/fix-issues.sh

      - name: Build and Test
        run: |
          if [ -f "package.json" ]; then
            npm ci && npm run build && npm run test
          elif [ -f "Cargo.toml" ]; then
            cargo build --release && cargo test
          elif [ -f "pyproject.toml" ]; then
            pip install -e . && python -m pytest
          elif [ -f "Makefile" ]; then
            make build && make test
          fi

      - name: Create Pull Request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 create-pr.py