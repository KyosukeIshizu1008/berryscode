syntax = "proto3";

package lsp_service;

import "google/protobuf/empty.proto";

// LSP Service - Unified Language Server Protocol operations
service LSPService {
  // Initialize LSP for a language
  rpc Initialize(InitializeRequest) returns (InitializeResponse);

  // Get code completions at a position
  rpc GetCompletions(CompletionRequest) returns (CompletionResponse);

  // Get hover information at a position
  rpc GetHover(HoverRequest) returns (HoverResponse);

  // Go to definition of a symbol
  rpc GotoDefinition(GotoDefinitionRequest) returns (LocationResponse);

  // Find all references to a symbol
  rpc FindReferences(FindReferencesRequest) returns (LocationsResponse);

  // Get diagnostics for a file
  rpc GetDiagnostics(DiagnosticsRequest) returns (DiagnosticsResponse);

  // Shutdown LSP client for a language
  rpc Shutdown(ShutdownRequest) returns (google.protobuf.Empty);

  // Shutdown all LSP clients
  rpc ShutdownAll(google.protobuf.Empty) returns (google.protobuf.Empty);

  // Get syntax highlighting theme
  rpc GetTheme(ThemeRequest) returns (ThemeResponse);
}

// Initialize request
message InitializeRequest {
  string language = 1;
  string root_uri = 2;
  optional string workspace_folder = 3;
}

message InitializeResponse {
  bool success = 1;
  optional string error = 2;
}

// Position in a document
message Position {
  uint32 line = 1;
  uint32 character = 2;
}

// Range in a document
message Range {
  Position start = 1;
  Position end = 2;
}

// Completion request
message CompletionRequest {
  string language = 1;
  string file_path = 2;
  Position position = 3;
}

message CompletionResponse {
  repeated CompletionItem items = 1;
}

message CompletionItem {
  string label = 1;
  optional uint32 kind = 2;
  optional string detail = 3;
  optional string documentation = 4;
  optional string insert_text = 5;
  optional string sort_text = 6;
  optional string filter_text = 7;
}

// Hover request
message HoverRequest {
  string language = 1;
  string file_path = 2;
  Position position = 3;
}

message HoverResponse {
  optional HoverInfo hover = 1;
}

message HoverInfo {
  string contents = 1;
  optional Range range = 2;
}

// Go to definition request
message GotoDefinitionRequest {
  string language = 1;
  string file_path = 2;
  Position position = 3;
}

message LocationResponse {
  repeated Location locations = 1;
}

message Location {
  string uri = 1;
  Range range = 2;
}

// Find references request
message FindReferencesRequest {
  string language = 1;
  string file_path = 2;
  Position position = 3;
  bool include_declaration = 4;
}

message LocationsResponse {
  repeated Location locations = 1;
}

// Diagnostics request
message DiagnosticsRequest {
  string language = 1;
  string file_path = 2;
}

message DiagnosticsResponse {
  repeated Diagnostic diagnostics = 1;
}

message Diagnostic {
  Range range = 1;
  uint32 severity = 2;
  optional string code = 3;
  optional string source = 4;
  string message = 5;
  repeated DiagnosticRelatedInformation related_information = 6;
}

message DiagnosticRelatedInformation {
  Location location = 1;
  string message = 2;
}

// Shutdown request
message ShutdownRequest {
  string language = 1;
}

// Theme request
message ThemeRequest {
  optional string theme_name = 1; // "gruvbox", "darcula", etc. If empty, returns default theme
}

// Theme response
message ThemeResponse {
  string theme_name = 1;
  ThemeColors colors = 2;
}

// Theme color definitions (RGB values 0-255)
message ThemeColors {
  // Syntax highlighting colors
  RGBColor keyword = 1;          // fn, struct, impl, let, mut
  RGBColor function = 2;         // Function calls and definitions
  RGBColor type_color = 3;       // Types (String, Option, etc.)
  RGBColor string = 4;           // String literals
  RGBColor number = 5;           // Numeric literals
  RGBColor comment = 6;          // Comments
  RGBColor macro_color = 7;      // Macros (println!, vec!)
  RGBColor attribute = 8;        // Attributes (#[derive])
  RGBColor constant = 9;         // CONSTANTS
  RGBColor lifetime = 10;        // Lifetimes ('a, 'static)

  // UI colors
  RGBColor background = 11;      // Editor background
  RGBColor foreground = 12;      // Default text color
  RGBColor selection = 13;       // Selection highlight
  RGBColor cursor = 14;          // Cursor color
  RGBColor line_number = 15;     // Line number gutter
}

// RGB color (0-255 values)
message RGBColor {
  uint32 r = 1; // Red (0-255)
  uint32 g = 2; // Green (0-255)
  uint32 b = 3; // Blue (0-255)
}
