<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BerryEditor - 100% Rust Code Editor</title>

    <!-- JetBrains Mono Font - Essential for IntelliJ look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- VS Code Codicons - Icon Font -->
    <link data-trunk rel="copy-dir" href="assets/fonts" data-target-path="fonts" />
    <link data-trunk rel="css" href="assets/fonts/codicon.css" />
    <!-- 🚀 preloadを削除: Tauriでは逆効果の可能性があるため、CSSの@font-faceに任せる -->

    <!-- 🎨 Tailwind CSS (Generated by pre_build hook) -->
    <!-- ✅ 100% Tailwind CSS - All styles in tailwind.config.js -->
    <link data-trunk rel="css" href="assets/tailwind.output.css" />

    <script type="module">
      // Tauri 2.0 の invoke を WASM から呼べるようにグローバルに露出させる
      window.berry_invoke = async (cmd, args) => {
        try {
          console.log('berry_invoke called:', cmd, args);
          // Tauri v2 の公式なアクセス方法
          if (window.__TAURI_INTERNALS__ && window.__TAURI_INTERNALS__.invoke) {
            const result = await window.__TAURI_INTERNALS__.invoke(cmd, args);
            console.log('berry_invoke result:', cmd, result);
            return result;
          } else {
            throw new Error('Tauri API not available');
          }
        } catch (e) {
          console.error("berry_invoke error:", cmd, e);
          throw e;
        }
      };
      console.log('berry_invoke registered');
    </script>
    <link data-trunk rel="rust" data-wasm-opt="0" data-target-name="berry_editor"/>
    <script>
        // ✅ 改良版: 警告を抑えつつ、フォントが確実に準備できてから開始する
        window.fontReady = (async () => {
            const checkFonts = async () => {
                // JetBrains Mono と Codicon (アイコン) の両方をチェック
                const jmReady = document.fonts.check("12px 'JetBrains Mono'");
                const icReady = document.fonts.check("12px 'codicon'");
                return jmReady && icReady;
            };

            if (document.fonts && document.fonts.ready) {
                await document.fonts.ready;
                // 準備ができるまで最大1秒待機（WASMプリロード警告対策で短めに）
                for (let i = 0; i < 20; i++) {
                    if (await checkFonts()) {
                        console.log('✅ All fonts (JetBrains Mono & Codicon) loaded');
                        return;
                    }
                    await new Promise(r => setTimeout(r, 50));
                }
            }
            console.warn('⚠️ Font loading timeout, proceeding anyway');
        })();

        // Error logging only - don't overwrite WASM content!
        window.addEventListener('error', (e) => {
            console.error('Global error:', e);
        });
    </script>
</head>
<body data-theme="darcula">
    <div id="berry-editor-wasm-root">Loading...</div>
</body>
</html>
